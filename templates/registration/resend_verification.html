{% extends "base.html" %}
{% load i18n %}

{% block title %}{% trans "Resend verification email" %}{% endblock %}

{% block content %}
<div class="auth-form">
    <h1>{% trans "Resend verification email" %}</h1>
    <form method="post">
        {% csrf_token %}
        <p>
            <label for="id_email">{% trans "Email address" %}</label>
            <input type="email" id="id_email" name="email" value="{{ initial_email }}" required autofocus>
        </p>
        <p><button type="submit">{% trans "Send verification email" %}</button></p>
    </form>
    <p class="auth-link"><a href="{% url 'marketplace:login' %}">{% trans "Back to login" %}</a></p>
</div>
{% endblock %}
