{% extends "base.html" %}
{% load i18n %}

{% block title %}{% trans "Messages" %}{% endblock %}

{% block content %}
{% include "marketplace/_thread_detail_content.html" %}
{% endblock %}

{% block extra_js %}
<script>
(function () {
    var form = document.querySelector('form[method="post"]');
    if (!form) return;
    var textarea = form.querySelector('textarea[name="body"]');
    var enterToggle = form.querySelector('input[name="enter_to_send"]');
    if (!textarea || !enterToggle) return;

    textarea.addEventListener('keydown', function (event) {
        if (event.key !== 'Enter') return;
        if (event.shiftKey) return;
        if (!enterToggle.checked) return;
        if (event.isComposing) return;
        event.preventDefault();
        if (form.requestSubmit) {
            form.requestSubmit();
            return;
        }
        form.submit();
    });
})();
</script>
{% endblock %}
